site_name: Chirath's Homelab
site_description: Homelab documentation — architecture, incidents, runbooks
site_author: Chirath
theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: cyan
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Architecture:
    - Overview: architecture/overview.md
    - Hardware: architecture/hardware.md
    - Services: architecture/services.md
    - Networking: architecture/networking.md
  - Incidents:
    - Backlog: incidents/backlog.md
  - Runbooks: runbooks/index.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - tables
  - attr_list

site_url: https://docs.chya43.it/
use_directory_urls: true
