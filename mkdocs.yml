site_name: Chirath's Homelab
site_description: Documentazione del homelab — architettura, incidenti, runbook
site_author: Chirath
theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: cyan
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Architettura:
    - Overview: architecture/overview.md
    - Hardware: architecture/hardware.md
    - Servizi: architecture/services.md
    - Networking: architecture/networking.md
  - Incidenti:
    - Backlog: incidents/backlog.md
  - Runbook: runbooks/index.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - tables
  - attr_list
site_url: https://docs.chya43.it/
use_directory_urls: true
